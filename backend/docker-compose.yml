services:
  mysql:
    image: mysql:8.0
    container_name: ment-agents-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ment_agents
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ment-agents-api
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PORT: 8080
      MYSQL_DSN: root:root@tcp(mysql:3306)/ment_agents?charset=utf8mb4&parseTime=True&loc=Local
      CONFIG_FILE: /app/config/config.yaml
    ports:
      - "8080:8080"

volumes:
  mysql_data:
